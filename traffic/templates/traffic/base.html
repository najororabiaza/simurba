{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simurba</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>">
    <style>
        /* ── Reset ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── Base ── */
        html, body {
            height: 100%;
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
        }

        /* ─────────────────────────────────────────
           LAYOUT DESKTOP (≥ 1024px)
           Canvas à gauche, dashboard à droite
        ───────────────────────────────────────── */
        body {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        #canvas-zone {
            flex: 3;
            position: relative;         /* nécessaire pour l'overlay absolu */
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333;
            overflow: hidden;
            padding: 12px;
        }

        #traffic-canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* ── Overlay de chargement ── */
        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #loading-overlay img {
            width: clamp(300px, 50vw, 500px);
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ── Dashboard ── */
        #dashboard {
            flex: 0 0 280px;
            padding: 16px;
            background: #16213e;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ─────────────────────────────────────────
           LAYOUT TABLETTE (768px – 1023px)
        ───────────────────────────────────────── */
        @media (max-width: 1023px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }

            #canvas-zone {
                border-right: none;
                border-bottom: 2px solid #333;
                padding: 16px;
                flex: none;
                width: 100%;
                height: 60vw;
                max-height: 520px;
                min-height: 300px;
            }

            #dashboard {
                flex: none;
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                padding: 16px;
            }

            #dashboard > div:first-child {
                grid-column: 1 / -1;
            }
        }

        /* ─────────────────────────────────────────
           LAYOUT MOBILE (< 768px)
        ───────────────────────────────────────── */
        @media (max-width: 767px) {
            body {
                flex-direction: column;
                height: auto;
                overflow-y: auto;
            }

            #canvas-zone {
                border-right: none;
                border-bottom: 2px solid #333;
                padding: 10px;
                height: 75vw;
                max-height: 400px;
                min-height: 220px;
            }

            #dashboard {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 12px;
                width: 100%;
            }
        }

        /* ─────────────────────────────────────────
           LAYOUT GRAND ÉCRAN (≥ 1440px)
        ───────────────────────────────────────── */
        @media (min-width: 1440px) {
            #dashboard { flex: 0 0 320px; }
        }

        /* ─────────────────────────────────────────
           COMPOSANTS
        ───────────────────────────────────────── */

        h2 {
            color: #e94560;
            font-size: clamp(15px, 2vw, 20px);
        }

        .section {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* ── Boutons différenciés ── */
        button {
            display: block;
            width: 100%;
            margin-bottom: 8px;
            padding: 9px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: clamp(12px, 1.5vw, 14px);
            color: white;
            transition: background 0.15s;
        }
        button:last-of-type { margin-bottom: 0; }

        #btn-start       { background: #22c55e; }
        #btn-start:hover { background: #16a34a; }
        #btn-pause       { background: #fb923c; }
        #btn-pause:hover { background: #ea7a1e; }
        #btn-reset       { background: #64748b; }
        #btn-reset:hover { background: #475569; }

        /* ── Slider de vitesse ── */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .slider-row label { font-size: 12px; color: #ccc; white-space: nowrap; }
        .slider-row input[type=range] { flex: 1; accent-color: #e94560; min-width: 0; }
        .slider-row span { font-size: 12px; color: #e94560; min-width: 28px; text-align: right; }

        /* ── Ligne d'état ── */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 10px;
        }
        #status { font-weight: 600; }

        /* ── Horloge ── */
        #clock {
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 0.05em;
            text-align: center;
            margin: 2px 0;
        }
        .clock-sub { font-size: 11px; color: #666; text-align: center; }

        /* ── Stats trafic ── */
        .stat-item { margin-bottom: 10px; }
        .stat-item:last-child { margin-bottom: 0; }
        .stat-label { font-size: clamp(11px, 1.4vw, 13px); margin-bottom: 4px; }
        .stat-bar-bg { background: #1a1a2e; height: 5px; border-radius: 3px; overflow: hidden; }
        .stat-bar { height: 5px; border-radius: 3px; width: 0%; transition: width 0.5s; }

        /* ── Scrollbar discrète ── */
        #dashboard::-webkit-scrollbar { width: 4px; }
        #dashboard::-webkit-scrollbar-track { background: transparent; }
        #dashboard::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ── Animations d'apparition au chargement ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeLeft {
            from { opacity: 0; transform: translateX(24px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* Canvas zone : glisse depuis la gauche */
        #canvas-zone {
            animation: fadeUp 0.6s ease both;
            animation-delay: 0.1s;
        }

        /* Dashboard : glisse depuis la droite, légèrement après */
        #dashboard > div:nth-child(1) { animation: fadeLeft 0.8s ease both; animation-delay: 0.4s; }
        #dashboard > div:nth-child(2) { animation: fadeLeft 0.8s ease both; animation-delay: 0.45s; }
        #dashboard > div:nth-child(3) { animation: fadeLeft 0.8s ease both; animation-delay: 0.6s; }
        #dashboard > div:nth-child(4) { animation: fadeLeft 0.8s ease both; animation-delay: 0.85s; }
    </style>
</head>
<body>

    <div id="canvas-zone">

        <!-- Overlay de chargement : visible jusqu'à ce que les 4 images soient prêtes -->
        <div id="loading-overlay">
            <img src="{% static 'traffic/img/loading.gif' %}" alt="Chargement...">
        </div>

        <canvas id="traffic-canvas"></canvas>
    </div>

    <div id="dashboard">

        <!-- En-tête -->
        <div>
            <h2>🚦 Simurba</h2>
        </div>

        <!-- Section 1 : Contrôles -->
        <div class="section">
            <p class="section-title">Contrôles</p>

            <div class="status-row">
                <span style="font-size:12px; color:#aaa;">État :</span>
                <span id="status" style="color:#4ade80;">en cours...</span>
            </div>

            <button id="btn-start">▶ Démarrer</button>
            <button id="btn-pause">⏸ Pauser</button>
            <button id="btn-reset">↺ Réinitialiser</button>

            <div class="slider-row">
                <label>🐢</label>
                <input type="range" id="speed-slider" min="1" max="5" step="0.5" value="1">
                <label>⚡</label>
                <span id="speed-label">×1</span>
            </div>
        </div>

        <!-- Section 2 : Horloge -->
        <div class="section">
            <p class="section-title">Temps de simulation</p>
            <div id="clock">00:00</div>
            <p class="clock-sub">mm:ss écoulées</p>
        </div>

        <!-- Section 3 : Trafic en direct -->
        <div class="section">
            <p class="section-title">Trafic en direct</p>

            <div class="stat-item">
                <div class="stat-label" style="color:#94a3b8;">
                    🚗 Véhicules actifs : <strong id="count-total">0</strong>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span style="color:#4ade80;">●</span> Fluide : <span id="count-fluide">0</span>
                </div>
                <div class="stat-bar-bg">
                    <div class="stat-bar" id="bar-fluide" style="background:#4ade80;"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span style="color:#fb923c;">●</span> Ralenti : <span id="count-ralenti">0</span>
                </div>
                <div class="stat-bar-bg">
                    <div class="stat-bar" id="bar-ralenti" style="background:#fb923c;"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span style="color:#ef4444;">●</span> Bouchon : <span id="count-bouchon">0</span>
                </div>
                <div class="stat-bar-bg">
                    <div class="stat-bar" id="bar-bouchon" style="background:#ef4444;"></div>
                </div>
            </div>
        </div>

    </div><!-- /dashboard -->

    <script src="{% static 'traffic/js/simulation.js' %}"></script>
</body>
</html>
