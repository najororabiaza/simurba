{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simurba</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #1a1a2e;
            color: white;
        }

        body {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        /* ─────────────────────────────────────────
           Canvas zone
        ───────────────────────────────────────── */
        #canvas-zone {
            flex: 3;
            position: relative;
            display: flex;
            align-items: stretch;
            justify-content: center;
            border-right: 2px solid #333;
            overflow: hidden;
            padding: 8px;
        }

        #traffic-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: crosshair;
        }

        /* ── Tooltip route ── */
        #route-tooltip {
            position: absolute;
            pointer-events: none;         /* ne bloque pas la souris */
            display: none;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            z-index: 20;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        #route-tooltip .tt-title {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }

        #route-tooltip .tt-state {
            font-size: 11px;
            color: #94a3b8;
        }

        #route-tooltip .tt-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* ── Overlay de chargement ── */
        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #loading-overlay img { width: clamp(300px, 50vw, 500px); }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ─────────────────────────────────────────
           Dashboard
        ───────────────────────────────────────── */
        #dashboard {
            flex: 0 0 280px;
            padding: 16px;
            background: #16213e;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Tablette ── */
        @media (max-width: 1023px) {
            body { flex-direction: column; height: auto; min-height: 100vh; overflow-y: auto; }
            #canvas-zone {
                border-right: none; border-bottom: 2px solid #333;
                flex: none; width: 100%; height: 60vw;
                max-height: 520px; min-height: 300px;
            }
            #dashboard {
                flex: none; width: 100%;
                display: grid; grid-template-columns: 1fr 1fr;
                gap: 12px; padding: 16px;
            }
            #dashboard > div:first-child { grid-column: 1 / -1; }
        }

        /* ── Mobile ── */
        @media (max-width: 767px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            #canvas-zone {
                border-right: none; border-bottom: 2px solid #333;
                height: 75vw; max-height: 400px; min-height: 220px;
            }
            #dashboard { display: flex; flex-direction: column; gap: 12px; padding: 12px; width: 100%; }
        }

        /* ── Grand écran ── */
        @media (min-width: 1440px) { #dashboard { flex: 0 0 320px; } }

        /* ─────────────────────────────────────────
           Composants
        ───────────────────────────────────────── */
        h2 { color: #e94560; font-size: clamp(15px, 2vw, 20px); }

        .section { background: #0f3460; border-radius: 8px; padding: 12px; }

        .section-title {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.08em; color: #aaa;
            margin-bottom: 10px; text-transform: uppercase;
        }

        /* ── Boutons ── */
        button {
            display: block; width: 100%; margin-bottom: 8px;
            padding: 9px; border: none; border-radius: 6px;
            cursor: pointer; font-size: clamp(12px, 1.5vw, 14px);
            font-family: 'Inter', sans-serif; color: white;
            transition: background 0.15s, opacity 0.15s;
        }
        button:last-of-type { margin-bottom: 0; }
        #btn-start       { background: #22c55e; }
        #btn-start:hover { background: #16a34a; }
        #btn-pause       { background: #fb923c; }
        #btn-pause:hover { background: #ea7a1e; }
        #btn-reset       { background: #64748b; }
        #btn-reset:hover { background: #475569; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        #btn-start:disabled:hover { background: #22c55e; }
        #btn-pause:disabled:hover { background: #fb923c; }
        #btn-reset:disabled:hover { background: #64748b; }

        /* ── Slider ── */
        .slider-row {
            display: flex; align-items: center;
            gap: 8px; margin-top: 8px;
        }
        .slider-row label { font-size: 12px; color: #ccc; white-space: nowrap; }
        .slider-row span  { font-size: 12px; color: #e94560; min-width: 28px; text-align: right; }
        .slider-row input[type=range] {
            flex: 1; min-width: 0;
            -webkit-appearance: none; appearance: none;
            height: 4px; border-radius: 2px;
            background: #334155; outline: none;
        }
        .slider-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: #e94560; cursor: pointer;
        }
        .slider-row input[type=range]::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%;
            background: #e94560; border: none; cursor: pointer;
        }

        /* ── Statut ── */
        .status-row {
            display: flex; justify-content: space-between;
            align-items: center; font-size: 13px; margin-bottom: 10px;
        }
        #status { font-weight: 600; }

        @keyframes pulse {
            0%, 100% { opacity: 1;   transform: scale(1);   }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 6px;
            background: #4ade80;
            animation: pulse 1.4s ease-in-out infinite;
            vertical-align: middle;
        }
        .status-dot.paused { background: #fb923c; animation: none; }

        /* ── Horloge ── */
        #clock {
            font-size: clamp(18px, 3vw, 24px); font-weight: 700;
            color: #e2e8f0; letter-spacing: 0.05em;
            text-align: center; margin: 2px 0;
        }
        .clock-sub { font-size: 11px; color: #666; text-align: center; }

        /* ── Stats trafic ── */
        .stat-item { margin-bottom: 10px; }
        .stat-item:last-child { margin-bottom: 0; }
        .stat-label { font-size: clamp(11px, 1.4vw, 13px); margin-bottom: 4px; }
        .stat-bar-bg { background: #1a1a2e; height: 5px; border-radius: 3px; overflow: hidden; }
        .stat-bar { height: 5px; border-radius: 3px; width: 0%; transition: width 0.5s; }

        /* ── Donut ── */
        .donut-wrapper {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 4px;
        }

        #donut-canvas {
            flex-shrink: 0;
        }

        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
        }

        .donut-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .donut-legend-dot {
            width: 9px; height: 9px;
            border-radius: 50%; flex-shrink: 0;
        }

        .donut-legend-pct {
            margin-left: auto;
            font-weight: 600;
            font-size: 12px;
            min-width: 32px;
            text-align: right;
        }

        /* ── Scrollbar ── */
        #dashboard::-webkit-scrollbar { width: 4px; }
        #dashboard::-webkit-scrollbar-track { background: transparent; }
        #dashboard::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeLeft {
            from { opacity: 0; transform: translateX(24px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        #canvas-zone { animation: fadeUp 0.6s ease both; animation-delay: 0.1s; }
        #dashboard > div:nth-child(1) { animation: fadeLeft 0.8s ease both; animation-delay: 0.40s; }
        #dashboard > div:nth-child(2) { animation: fadeLeft 0.8s ease both; animation-delay: 0.45s; }
        #dashboard > div:nth-child(3) { animation: fadeLeft 0.8s ease both; animation-delay: 0.60s; }
        #dashboard > div:nth-child(4) { animation: fadeLeft 0.8s ease both; animation-delay: 0.75s; }
        #dashboard > div:nth-child(5) { animation: fadeLeft 0.8s ease both; animation-delay: 0.90s; }
    </style>
</head>
<body>

    <div id="canvas-zone">
        <div id="loading-overlay">
            <img src="{% static 'traffic/img/loading.gif' %}" alt="Chargement...">
        </div>
        <canvas id="traffic-canvas"></canvas>

        <!-- Tooltip route — positionné par JS -->
        <div id="route-tooltip">
            <div class="tt-title" id="tt-title">Route</div>
            <div class="tt-state">
                <span class="tt-dot" id="tt-dot"></span>
                <span id="tt-state-text"></span>
            </div>
        </div>
    </div>

    <div id="dashboard">

        <!-- En-tête -->
        <div>
            <h2>🚦 Simurba</h2>
        </div>

        <!-- Section 1 : Contrôles -->
        <div class="section">
            <p class="section-title">Contrôles</p>

            <div class="status-row">
                <span style="font-size:12px; color:#aaa;">État :</span>
                <span style="display:flex; align-items:center;">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status" style="color:#4ade80;">en cours...</span>
                </span>
            </div>

            <button id="btn-start">▶ Démarrer</button>
            <button id="btn-pause">⏸ Pauser</button>
            <button id="btn-reset">↺ Réinitialiser</button>

            <div class="slider-row">
                <label>🐢</label>
                <input type="range" id="speed-slider" min="1" max="5" step="0.5" value="1">
                <label>⚡</label>
                <span id="speed-label">×1</span>
            </div>
        </div>

        <!-- Section 2 : Horloge -->
        <div class="section">
            <p class="section-title">Temps de simulation</p>
            <div id="clock">00:00</div>
            <p class="clock-sub">mm:ss écoulées</p>
        </div>

        <!-- Section 3 : Densité globale (donut) -->
        <div class="section">
            <p class="section-title">Densité globale</p>
            <div class="donut-wrapper">
                <canvas id="donut-canvas" width="90" height="90"></canvas>
                <div class="donut-legend">
                    <div class="donut-legend-item">
                        <span class="donut-legend-dot" style="background:#4ade80;"></span>
                        <span>Fluide</span>
                        <span class="donut-legend-pct" id="pct-fluide">—</span>
                    </div>
                    <div class="donut-legend-item">
                        <span class="donut-legend-dot" style="background:#fb923c;"></span>
                        <span>Ralenti</span>
                        <span class="donut-legend-pct" id="pct-ralenti">—</span>
                    </div>
                    <div class="donut-legend-item">
                        <span class="donut-legend-dot" style="background:#ef4444;"></span>
                        <span>Bouchon</span>
                        <span class="donut-legend-pct" id="pct-bouchon">—</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 4 : Trafic en direct -->
        <div class="section">
            <p class="section-title">Trafic en direct</p>

            <div class="stat-item">
                <div class="stat-label" style="color:#94a3b8;">
                    🚗 Véhicules actifs : <strong id="count-total">0</strong>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span style="color:#4ade80;">●</span> Fluide : <span id="count-fluide">0</span>
                </div>
                <div class="stat-bar-bg">
                    <div class="stat-bar" id="bar-fluide" style="background:#4ade80;"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span style="color:#fb923c;">●</span> Ralenti : <span id="count-ralenti">0</span>
                </div>
                <div class="stat-bar-bg">
                    <div class="stat-bar" id="bar-ralenti" style="background:#fb923c;"></div>
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    <span style="color:#ef4444;">●</span> Bouchon : <span id="count-bouchon">0</span>
                </div>
                <div class="stat-bar-bg">
                    <div class="stat-bar" id="bar-bouchon" style="background:#ef4444;"></div>
                </div>
            </div>
        </div>

    </div><!-- /dashboard -->

    <script src="{% static 'traffic/js/simulation.js' %}"></script>
</body>
</html>
