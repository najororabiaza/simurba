{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simurba</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; height: 100vh; font-family: sans-serif; background: #1a1a2e; color: white; }
        #canvas-zone { flex: 3; display: flex; align-items: center; justify-content: center; border-right: 2px solid #333; }
        #dashboard { flex: 1; padding: 20px; background: #16213e; }
        h2 { margin-bottom: 20px; color: #e94560; }
        button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #c73652; }
    </style>
</head>
<body>
    <div id="canvas-zone">
        <canvas id="traffic-canvas" width="600" height="500"></canvas>
    </div>
    <div id="dashboard">
        <h2>🚦 Simurba</h2>
            <p>État : <span id="status">en cours...</span></p>
            <br>
            <button id="btn-start">▶ Démarrer</button>
            <button id="btn-pause">⏸ Pauser</button>
            <button id="btn-reset">↺ Réinitialiser</button>
            <br>
            <div style="margin-top:20px;">
                <p style="color:#aaa; font-size:12px; margin-bottom:10px;">TRAFIC EN DIRECT</p>
                <div style="margin-bottom:8px;">
                    <p><span style="color:#4ade80">●</span> Fluide : <span id="count-fluide">0</span></p>
                    <div style="background:#4ade80; height:4px; border-radius:2px; width:0%; transition:width 0.5s;" id="bar-fluide"></div>
                </div>
                <div style="margin-bottom:8px;">
                    <p><span style="color:#fb923c">●</span> Ralenti : <span id="count-ralenti">0</span></p>
                    <div style="background:#fb923c; height:4px; border-radius:2px; width:0%; transition:width 0.5s;" id="bar-ralenti"></div>
                </div>
                <div style="margin-bottom:8px;">
                    <p><span style="color:#ef4444">●</span> Bouchon : <span id="count-bouchon">0</span></p>
                    <div style="background:#ef4444; height:4px; border-radius:2px; width:0%; transition:width 0.5s;" id="bar-bouchon"></div>
                </div>
            </div>
    </div>
    <script src="{% static 'traffic/js/simulation.js' %}"></script>
</body>
</html>
